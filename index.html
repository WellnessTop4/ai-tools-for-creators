<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>AI Tools for Creators</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: url('https://source.unsplash.com/1600x900/?technology,dark') no-repeat center center fixed;
  background-size: cover;
  margin: 0;
  padding: 40px 20px;
  color: #f0f0f0;
}
header {
  text-align: center;
  margin-bottom: 40px;
  text-shadow: 0 2px 6px rgba(0,0,0,0.7);
}
h1 { color: #bb86fc; margin-bottom: 5px; }
.subtitle { color: #aaa; font-size: 14px; }
.lang-select {
  margin-top: 10px;
  padding: 6px;
  border-radius: 6px;
  border: 1px solid #444;
  background:#333; color:#f0f0f0;
}
.container {
  max-width: 1000px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.tool-card {
  background: rgba(31,31,31,0.95);
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.6);
  transition: 0.2s;
}
.tool-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.8);
}
h2 { margin-top:0; color:#bb86fc; font-size:18px; }
input, textarea, select {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:1px solid #444;
  border-radius:6px;
  font-size:14px;
  background:#333;
  color:#f0f0f0;
  box-sizing:border-box;
}
textarea{ min-height:90px; }
button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#bb86fc;
  color:#121212;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}
button:hover{ background:#985eff; }
.output {
  margin-top:12px;
  background:#2c2c2c;
  border:1px solid #444;
  padding:12px;
  border-radius:6px;
  white-space:pre-wrap;
  font-size:14px;
  color:#f0f0f0;
}
footer {
  text-align:center;
  margin-top:40px;
  font-size:13px;
  color:#aaa;
}
@media(max-width:700px){ .container{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
<h1>AI Tools for Creators</h1>
<div class="subtitle" id="headerSubtitle">Gratis værktøjer til captions, hashtags, prompts og bio</div>
<select class="lang-select" id="langSelect" onchange="changeLang()">
  <option value="da">Dansk</option>
  <option value="en">English</option>
  <option value="ar">العربية</option>
  <option value="fr">Français</option>
  <option value="de">Deutsch</option>
  <option value="es">Español</option>
</select>
</header>

<div class="container">

<!-- Hashtag Generator -->
<div class="tool-card">
<h2 id="hashtagTitle">Hashtag Generator</h2>
<input id="topic" placeholder="Skriv emne fx 'fitness'">
<button onclick="generateHashtags()">Generate Hashtags</button>
<div class="output" id="hashtagOutput"></div>
</div>

<!-- Clickbait Title Generator -->
<div class="tool-card">
<h2 id="clickbaitTitle">Clickbait Title Generator</h2>
<input id="clickbaitTopic" placeholder="Skriv emne fx 'AI'">
<button onclick="generateTitle()">Generate Title</button>
<div class="output" id="titleOutput"></div>
</div>

<!-- Emoji Enhancer -->
<div class="tool-card">
<h2 id="emojiTitle">Emoji Enhancer</h2>
<textarea id="emojiText" placeholder="Skriv tekst…"></textarea>
<button onclick="addEmojis()">Add Emojis</button>
<div class="output" id="emojiOutput"></div>
</div>

<!-- Word Counter -->
<div class="tool-card">
<h2 id="wordTitle">Word Counter</h2>
<textarea id="wordText" placeholder="Skriv tekst…"></textarea>
<button onclick="countWords()">Count Words</button>
<div class="output" id="wordOutput"></div>
</div>

<!-- Prompt Generator -->
<div class="tool-card">
<h2 id="promptTitle">Prompt Generator</h2>
<button onclick="generatePrompt()">Generate Prompt</button>
<div class="output" id="promptOutput"></div>
</div>

<!-- Bio Generator -->
<div class="tool-card">
<h2 id="bioTitle">AI Bio Generator</h2>
<textarea id="bioInput" placeholder="Skriv ide eller beskrivelse…"></textarea>
<button onclick="generateBio()">Generate Bio</button>
<div class="output" id="bioOutput"></div>
</div>

</div>

<footer id="footerText">Free AI tools for content creators</footer>

<script>
// --- LANGUAGES ---
const translations = {
  da:{ header:"Gratis værktøjer til captions, hashtags, prompts og bio", hashtag:"Hashtag Generator", clickbait:"Clickbait Title Generator", emoji:"Emoji Enhancer", word:"Word Counter", prompt:"Prompt Generator", bio:"AI Bio Generator", footer:"Gratis AI værktøjer for creators" },
  en:{ header:"Free tools for captions, hashtags, prompts and bio", hashtag:"Hashtag Generator", clickbait:"Clickbait Title Generator", emoji:"Emoji Enhancer", word:"Word Counter", prompt:"Prompt Generator", bio:"AI Bio Generator", footer:"Free AI tools for content creators" },
  ar:{ header:"أدوات مجانية للكتابات والهاشتاجات والبروامبت والسيرة الذاتية", hashtag:"مولد هاشتاج", clickbait:"مولد عناوين مثيرة", emoji:"محسن الرموز التعبيرية", word:"عداد الكلمات", prompt:"مولد العبارات", bio:"مولد السيرة الذاتية", footer:"أدوات AI مجانية للمنشئين" },
  fr:{ header:"Outils gratuits pour légendes, hashtags, prompts et bio", hashtag:"Générateur de hashtags", clickbait:"Générateur de titres accrocheurs", emoji:"Améliorateur d'emojis", word:"Compteur de mots", prompt:"Générateur de prompts", bio:"Générateur de bio", footer:"Outils AI gratuits pour créateurs" },
  de:{ header:"Kostenlose Tools für Captions, Hashtags, Prompts und Bio", hashtag:"Hashtag Generator", clickbait:"Clickbait-Titel Generator", emoji:"Emoji Enhancer", word:"Wortzähler", prompt:"Prompt Generator", bio:"AI Bio Generator", footer:"Kostenlose AI-Tools für Creator" },
  es:{ header:"Herramientas gratuitas para captions, hashtags, prompts y bio", hashtag:"Generador de Hashtags", clickbait:"Generador de Títulos Clickbait", emoji:"Mejorador de Emojis", word:"Contador de Palabras", prompt:"Generador de Prompts", bio:"Generador de Bio", footer:"Herramientas AI gratuitas para creadores" }
};
function changeLang(){
  const lang = document.getElementById("langSelect").value;
  const t = translations[lang];
  document.getElementById("headerSubtitle").innerText = t.header;
  document.getElementById("hashtagTitle").innerText = t.hashtag;
  document.getElementById("clickbaitTitle").innerText = t.clickbait;
  document.getElementById("emojiTitle").innerText = t.emoji;
  document.getElementById("wordTitle").innerText = t.word;
  document.getElementById("promptTitle").innerText = t.prompt;
  document.getElementById("bioTitle").innerText = t.bio;
  document.getElementById("footerText").innerText = t.footer;
}

// --- HASHTAGS ---
const hashtagDb = {
  fitness:["#Fitness","#Gym","#Workout","#Health","#FitLife"],
  travel:["#Travel","#Adventure","#Explore","#Wanderlust","#TravelLife"],
  food:["#Food","#Foodie","#Delicious","#InstaFood","#Yummy"],
  tech:["#Tech","#AI","#Innovation","#Future","#Startup"]
};
function generateHashtags(){
  const topic = document.getElementById("topic").value.toLowerCase();
  const list = hashtagDb[topic] || ["#Content","#Creator","#Trending","#Viral","#Ideas"];
  document.getElementById("hashtagOutput").innerText=list.join(" ");
}

// --- CLICKBAIT ---
const titles = [
  "Du vil ikke tro hvad der skete med {topic}",
  "5 hemmeligheder om {topic} som ingen fortæller",
  "Hvordan {topic} ændrede alt",
  "Sandheden om {topic}",
  "Top tricks creators bruger til {topic}"
];
function generateTitle(){
  const topic=document.getElementById("clickbaitTopic").value||"dette emne";
  const template=titles[Math.floor(Math.random()*titles.length)];
  document.getElementById("titleOutput").innerText=template.replace("{topic}",topic);
}

// --- EMOJIS ---
const emojiMap={ love:"❤️", coffee:"☕", travel:"🌍", happy:"😊", food:"🍔", star:"⭐" };
function addEmojis(){
  let txt=document.getElementById("emojiText").value;
  for(const word in emojiMap){
    const re=new RegExp("\\b"+word+"\\b","gi");
    txt=txt.replace(re,emojiMap[word]+" "+word);
  }
  document.getElementById("emojiOutput").innerText=txt;
}

// --- WORD COUNTER ---
function countWords(){
  const txt=document.getElementById("wordText").value.trim();
  const words=txt?txt.split(/\s+/).length:0;
  const chars=txt.length;
  document.getElementById("wordOutput").innerText="Words: "+words+"\nCharacters: "+chars;
}

// --- PROMPT GENERATOR ---
const subjects=["AI","Fitness","Marketing","Travel","Food"];
const actions=["ideas","tips","strategies","guides"];
const formats=["for TikTok","for Instagram","for YouTube","for blogs"];
function generatePrompt(){
  const s=subjects[Math.floor(Math.random()*subjects.length)];
  const a=actions[Math.floor(Math.random()*actions.length)];
  const f=formats[Math.floor(Math.random()*formats.length)];
  document.getElementById("promptOutput").innerText="Create "+a+" about "+s+" "+f;
}

// --- BIO GENERATOR ---
function generateBio(){
  const text=document.getElementById("bioInput").value.trim();
  if(!text){ document.getElementById("bioOutput").innerText="Skriv ide først."; return; }
  const lines=text.split(/\n|\.|,/).filter(l=>l.trim()!="");
  let bio="";
  lines.forEach((l,i)=>{ bio += "• "+l+"\n"; });
  document.getElementById("bioOutput").innerText=bio;
}
</script>

</body>
</html>
