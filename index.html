<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tools for Creators</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #f0f0f0;
            padding: 20px;
            margin: 0;
        }
        h1, h2 {
            text-align: center;
        }
        .container {
            max-width: 1200px;
            margin: auto;
        }
        .tool {
            margin-bottom: 40px;
            padding: 20px;
            background: #1f1f1f;
            border-radius: 10px;
        }
        button {
            background-color: #BB86FC;
            color: #fff;
            border: none;
            padding: 12px 24px;
            border-radius: 6px;
            cursor: pointer;
        }
        button:hover {
            background-color: #985eff;
        }
        textarea, input[type="file"] {
            width: 100%;
            padding: 10px;
            border-radius: 6px;
            margin-bottom: 10px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
        }
        .output {
            background: #2c2c2c;
            padding: 10px;
            border-radius: 6px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>AI Tools for Creators</h1>
        
        <!-- File Upload -->
        <div class="tool">
            <h2>File Upload</h2>
            <input type="file" id="fileInput">
            <button onclick="uploadFile()">Upload File</button>
            <div class="output" id="fileOutput"></div>
        </div>

        <!-- Hashtag Generator -->
        <div class="tool">
            <h2>Hashtag Generator</h2>
            <input type="text" id="hashtagInput" placeholder="Enter a topic (e.g., fitness)">
            <button onclick="generateHashtags()">Generate Hashtags</button>
            <div class="output" id="hashtagOutput"></div>
        </div>

        <!-- Text Generator -->
        <div class="tool">
            <h2>Text Generator</h2>
            <textarea id="textInput" placeholder="Write some text..."></textarea>
            <button onclick="generateText()">Generate Text</button>
            <div class="output" id="textOutput"></div>
        </div>

        <!-- Language Switcher -->
        <div class="tool">
            <h2>Language Switcher</h2>
            <select id="languageSelect" onchange="changeLanguage()">
                <option value="en">English</option>
                <option value="da">Danish</option>
                <option value="es">Spanish</option>
                <option value="fr">French</option>
                <option value="de">German</option>
                <option value="ar">Arabic</option>
            </select>
            <div class="output" id="languageOutput"></div>
        </div>
    </div>

    <script>
        let selectedLang = "en";  // Default language is English
        
        // File Upload Handler
        function uploadFile() {
            const fileInput = document.getElementById("fileInput");
            const file = fileInput.files[0];
            const outputDiv = document.getElementById("fileOutput");
            if (file) {
                outputDiv.innerHTML = getTranslation("fileInfo").replace("{filename}", file.name).replace("{filesize}", file.size);
            } else {
                outputDiv.innerHTML = getTranslation("noFileSelected");
            }
        }

        // Hashtag Generator Handler
        const hashtagDb = {
            fitness: {
                en: ["#Fitness", "#Workout", "#Health", "#FitLife"],
                da: ["#Fitness", "#Træning", "#Sundhed", "#FitLiv"],
                es: ["#Aptitud", "#Entrenamiento", "#Salud", "#VidaFit"],
                fr: ["#Forme", "#Entraînement", "#Santé", "#VieFit"],
                de: ["#Fitness", "#Workout", "#Gesundheit", "#FitLeben"],
                ar: ["#لياقة", "#تمرين", "#صحة", "#حياة_مناسبة"]
            },
            food: {
                en: ["#Foodie", "#Delicious", "#Yummy", "#Food"],
                da: ["#Madelsker", "#Lækker", "#Smagfuld", "#Mad"],
                es: ["#Comida", "#Deliciosa", "#Sabrosa", "#Comida"],
                fr: ["#Gourmand", "#Délicieux", "#Savoureux", "#Nourriture"],
                de: ["#Essen", "#Lecker", "#Köstlich", "#Nahrung"],
                ar: ["#طعام", "#لذيذ", "#شهي", "#طعام"]
            }
        };

        function generateHashtags() {
            const topic = document.getElementById("hashtagInput").value.toLowerCase();
            const hashtags = hashtagDb[topic] ? hashtagDb[topic][selectedLang] : ["#Creative", "#Content", "#Trending"];
            document.getElementById("hashtagOutput").innerText = hashtags.join(" ");
        }

        // Text Generator Handler
        function generateText() {
            const inputText = document.getElementById("textInput").value;
            document.getElementById("textOutput").innerText = inputText.toUpperCase();
        }

        // Language Switcher
        function changeLanguage() {
            selectedLang = document.getElementById("languageSelect").value;
            const languageOutput = document.getElementById("languageOutput");

            if (selectedLang === "en") {
                languageOutput.innerText = "You have selected English.";
            } else if (selectedLang === "da") {
                languageOutput.innerText = "Du har valgt Dansk.";
            } else if (selectedLang === "es") {
                languageOutput.innerText = "Has seleccionado Español.";
            } else if (selectedLang === "fr") {
                languageOutput.innerText = "Vous avez sélectionné Français.";
            } else if (selectedLang === "de") {
                languageOutput.innerText = "Du hast Deutsch gewählt.";
            } else if (selectedLang === "ar") {
                languageOutput.innerText = "لقد اخترت العربية.";
            }
        }

        // Helper function to get translation based on selected language
        function getTranslation(key) {
            const translations = {
                fileInfo: {
                    en: "File Name: {filename}<br>File Size: {filesize} bytes",
                    da: "Filnavn: {filename}<br>Filstørrelse: {filesize} bytes",
                    es: "Nombre del archivo: {filename}<br>Tamaño del archivo: {filesize} bytes",
                    fr: "Nom du fichier : {filename}<br>Taille du fichier : {filesize} octets",
                    de: "Dateiname: {filename}<br>Dateigröße: {filesize} Bytes",
                    ar: "اسم الملف: {filename}<br>حجم الملف: {filesize} بايت"
                },
                noFileSelected: {
                    en: "No file selected.",
                    da: "Ingen fil valgt.",
                    es: "No se seleccionó archivo.",
                    fr: "Aucun fichier sélectionné.",
                    de: "Keine Datei ausgewählt.",
                    ar: "لم يتم اختيار ملف."
                }
            };

            return translations[key][selectedLang];
        }
    </script>
</body>
</html>
