<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>AI Tools for Creators</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #121212 url('https://images.unsplash.com/photo-1503676260728-1c00da094a0b?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
  background-size: cover;
  margin: 0;
  padding: 40px 20px;
  color: #f0f0f0;
}
header {
  text-align: center;
  margin-bottom: 40px;
}
h1 { color: #bb86fc; margin-bottom: 5px; }
.subtitle { color: #aaa; font-size: 14px; }
#languageSelect {
  margin-top:10px;
  padding:5px;
  border-radius:5px;
  background:#1f1f1f;
  color:#f0f0f0;
  border:none;
}
.container {
  max-width: 1000px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.tool-card {
  background: rgba(31,31,31,0.9);
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.6);
  transition: 0.2s;
}
.tool-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.8);
}
h2 { margin-top:0; color:#bb86fc; font-size:18px; }
input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:1px solid #444;
  border-radius:6px;
  font-size:14px;
  background:#333;
  color:#f0f0f0;
  box-sizing:border-box;
}
textarea{ min-height:90px; }
button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#bb86fc;
  color:#121212;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}
button:hover{ background:#985eff; }
.output {
  margin-top:12px;
  background:#2c2c2c;
  border:1px solid #444;
  padding:12px;
  border-radius:6px;
  white-space:pre-wrap;
  font-size:14px;
  color:#f0f0f0;
}
footer {
  text-align:center;
  margin-top:40px;
  font-size:13px;
  color:#aaa;
}
@media(max-width:700px){ .container{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
<h1 id="headerTitle">AI Tools for Creators</h1>
<div class="subtitle" id="headerSubtitle">Gratis værktøjer til captions, hashtags, prompts og bio</div>
<select id="languageSelect" onchange="setLanguage()">
  <option value="da">Dansk</option>
  <option value="en">English</option>
</select>
</header>

<div class="container">

<!-- Hashtag Generator -->
<div class="tool-card">
<h2 id="hashtagTitle">Hashtag Generator</h2>
<input id="topic" placeholder="Skriv emne fx 'fitness'">
<button onclick="generateHashtags()" id="hashtagBtn">Generate Hashtags</button>
<div class="output" id="hashtagOutput"></div>
</div>

<!-- Clickbait Title Generator -->
<div class="tool-card">
<h2 id="titleGenTitle">Clickbait Title Generator</h2>
<input id="clickbaitTopic" placeholder="Skriv emne fx 'AI'">
<button onclick="generateTitle()" id="titleBtn">Generate Title</button>
<div class="output" id="titleOutput"></div>
</div>

<!-- Emoji Enhancer -->
<div class="tool-card">
<h2 id="emojiTitle">Emoji Enhancer</h2>
<textarea id="emojiText" placeholder="Skriv tekst…"></textarea>
<button onclick="addEmojis()" id="emojiBtn">Add Emojis</button>
<div class="output" id="emojiOutput"></div>
</div>

<!-- Word Counter -->
<div class="tool-card">
<h2 id="wordTitle">Word Counter</h2>
<textarea id="wordText" placeholder="Skriv tekst…"></textarea>
<button onclick="countWords()" id="wordBtn">Count Words</button>
<div class="output" id="wordOutput"></div>
</div>

<!-- Prompt Generator -->
<div class="tool-card">
<h2 id="promptTitle">Prompt Generator</h2>
<button onclick="generatePrompt()" id="promptBtn">Generate Prompt</button>
<div class="output" id="promptOutput"></div>
</div>

<!-- Bio Generator -->
<div class="tool-card">
<h2 id="bioTitle">Bio Generator</h2>
<input id="bioTopic" placeholder="Skriv kort info om dig selv">
<button onclick="generateBio()" id="bioBtn">Generate Bio</button>
<div class="output" id="bioOutput"></div>
</div>

</div>

<footer id="footerText">Free AI tools for content creators</footer>

<script>
let lang = 'da';

const texts = {
  da: {
    headerTitle: "AI Tools for Creators",
    headerSubtitle: "Gratis værktøjer til captions, hashtags, prompts og bio",
    hashtagTitle: "Hashtag Generator",
    hashtagBtn: "Generer Hashtags",
    titleGenTitle: "Clickbait Title Generator",
    titleBtn: "Generer Titel",
    emojiTitle: "Emoji Enhancer",
    emojiBtn: "Tilføj Emojis",
    wordTitle: "Word Counter",
    wordBtn: "Tæl Ord",
    promptTitle: "Prompt Generator",
    promptBtn: "Generer Prompt",
    bioTitle: "Bio Generator",
    bioBtn: "Generer Bio",
    footerText: "Gratis AI værktøjer til creators"
  },
  en: {
    headerTitle: "AI Tools for Creators",
    headerSubtitle: "Free tools for captions, hashtags, prompts and bio",
    hashtagTitle: "Hashtag Generator",
    hashtagBtn: "Generate Hashtags",
    titleGenTitle: "Clickbait Title Generator",
    titleBtn: "Generate Title",
    emojiTitle: "Emoji Enhancer",
    emojiBtn: "Add Emojis",
    wordTitle: "Word Counter",
    wordBtn: "Count Words",
    promptTitle: "Prompt Generator",
    promptBtn: "Generate Prompt",
    bioTitle: "Bio Generator",
    bioBtn: "Generate Bio",
    footerText: "Free AI tools for content creators"
  }
};

function setLanguage() {
  lang = document.getElementById('languageSelect').value;
  for (const id in texts[lang]) {
    const el = document.getElementById(id);
    if(el) el.innerText = texts[lang][id];
  }
}

/* HASHTAGS */
function generateHashtags(){
  const topic=document.getElementById("topic").value.trim();
  if(!topic){ document.getElementById("hashtagOutput").innerText="Indtast et emne."; return; }
  const words = topic.split(/\s+/);
  const hashtags = words.map(w => "#"+w.replace(/[^a-zA-Z0-9]/g,'')).join(" ");
  document.getElementById("hashtagOutput").innerText = hashtags;
}

/* CLICKBAIT */
const titlesDa=[
  "Du vil ikke tro hvad der skete med {topic}",
  "5 hemmeligheder om {topic} som ingen fortæller",
  "Hvordan {topic} ændrede alt",
  "Sandheden om {topic}",
  "Top tricks creators bruger til {topic}"
];
const titlesEn=[
  "You won't believe what happened with {topic}",
  "5 secrets about {topic} nobody tells",
  "How {topic} changed everything",
  "The truth about {topic}",
  "Top tricks creators use for {topic}"
];
function generateTitle(){
  const topic=document.getElementById("clickbaitTopic").value || (lang=='da'?'dette emne':'this topic');
  const templates = lang=='da'? titlesDa : titlesEn;
  const template=templates[Math.floor(Math.random()*templates.length)];
  document.getElementById("titleOutput").innerText = template.replace("{topic}",topic);
}

/* EMOJIS */
const emojiMap={ love:"❤️", coffee:"☕", travel:"🌍", happy:"😊", food:"🍔", star:"⭐" };
function addEmojis(){
  let txt=document.getElementById("emojiText").value;
  for(const word in emojiMap){
    const re=new RegExp("\\b"+word+"\\b","gi");
    txt=txt.replace(re,emojiMap[word]+" "+word);
  }
  document.getElementById("emojiOutput").innerText=txt;
}

/* WORD COUNTER */
function countWords(){
  const txt=document.getElementById("wordText").value.trim();
  const words=txt?txt.split(/\s+/).length:0;
  const chars=txt.length;
  document.getElementById("wordOutput").innerText="Words: "+words+"\nCharacters: "+chars;
}

/* PROMPT GENERATOR */
const subjects=["AI","Fitness","Marketing","Travel","Food"];
const actions=["ideas","tips","strategies","guides"];
const formats=["for TikTok","for Instagram","for YouTube","for blogs"];
function generatePrompt(){
  const s=subjects[Math.floor(Math.random()*subjects.length)];
  const a=actions[Math.floor(Math.random()*actions.length)];
  const f=formats[Math.floor(Math.random()*formats.length)];
  document.getElementById("promptOutput").innerText="Create "+a+" about "+s+" "+f;
}

/* BIO GENERATOR */
function generateBio(){
  const topic=document.getElementById("bioTopic").value.trim();
  if(!topic){ document.getElementById("bioOutput").innerText="Skriv lidt info først."; return; }
  document.getElementById("bioOutput").innerText="Creator passionate about "+topic;
}
</script>

</body>
</html>
