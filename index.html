<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>AI Tools for Creators</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #121212 url('https://images.unsplash.com/photo-1507525428034-b723cf961d3e?fit=crop&w=1400&h=800') no-repeat center center fixed;
  background-size: cover;
  margin: 0;
  padding: 40px 20px;
  color: #f0f0f0;
}
header {
  text-align: center;
  margin-bottom: 40px;
}
h1 { color: #bb86fc; margin-bottom: 5px; }
.subtitle { color: #aaa; font-size: 14px; }
.container {
  max-width: 1000px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.tool-card {
  background: rgba(31,31,31,0.85);
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.6);
  transition: 0.2s;
}
.tool-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.8);
}
h2 { margin-top:0; color:#bb86fc; font-size:18px; }
input, textarea, select {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:1px solid #444;
  border-radius:6px;
  font-size:14px;
  background:#333;
  color:#f0f0f0;
  box-sizing:border-box;
}
textarea{ min-height:90px; }
button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#bb86fc;
  color:#121212;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}
button:hover{ background:#985eff; }
.output {
  margin-top:12px;
  background:#2c2c2c;
  border:1px solid #444;
  padding:12px;
  border-radius:6px;
  white-space:pre-wrap;
  font-size:14px;
  color:#f0f0f0;
}
.download-btn {
  margin-top:8px;
  padding:6px;
  background:#03dac6;
  color:#121212;
  border:none;
  border-radius:4px;
  cursor:pointer;
  font-size:13px;
}
.download-btn:hover { background:#00bfa5; }
footer {
  text-align:center;
  margin-top:40px;
  font-size:13px;
  color:#aaa;
}
@media(max-width:700px){ .container{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
<h1>AI Tools for Creators</h1>
<div class="subtitle">Gratis værktøjer til captions, hashtags, prompts og bio på 6 sprog</div>
</header>

<div class="container">

<!-- Hashtag Generator -->
<div class="tool-card">
<h2>Hashtag Generator</h2>
<input id="topic" placeholder="Skriv emne fx 'fitness'">
<select id="langHashtag">
  <option value="da">Dansk</option>
  <option value="en">English</option>
  <option value="ar">Arabic</option>
  <option value="fr">Français</option>
  <option value="de">Deutsch</option>
  <option value="es">Español</option>
</select>
<button onclick="generateHashtags()">Generate Hashtags</button>
<div class="output" id="hashtagOutput"></div>
<button class="download-btn" onclick="downloadOutput('hashtagOutput','hashtags.txt')">Download</button>
</div>

<!-- Clickbait Title Generator -->
<div class="tool-card">
<h2>Clickbait Title Generator</h2>
<input id="clickbaitTopic" placeholder="Skriv emne fx 'AI'">
<select id="langTitle">
  <option value="da">Dansk</option>
  <option value="en">English</option>
  <option value="ar">Arabic</option>
  <option value="fr">Français</option>
  <option value="de">Deutsch</option>
  <option value="es">Español</option>
</select>
<button onclick="generateTitle()">Generate Title</button>
<div class="output" id="titleOutput"></div>
<button class="download-btn" onclick="downloadOutput('titleOutput','title.txt')">Download</button>
</div>

<!-- Emoji Enhancer -->
<div class="tool-card">
<h2>Emoji Enhancer</h2>
<textarea id="emojiText" placeholder="Skriv tekst…"></textarea>
<button onclick="addEmojis()">Add Emojis</button>
<div class="output" id="emojiOutput"></div>
<button class="download-btn" onclick="downloadOutput('emojiOutput','emoji.txt')">Download</button>
</div>

<!-- Word Counter -->
<div class="tool-card">
<h2>Word Counter</h2>
<textarea id="wordText" placeholder="Skriv tekst…"></textarea>
<button onclick="countWords()">Count Words</button>
<div class="output" id="wordOutput"></div>
<button class="download-btn" onclick="downloadOutput('wordOutput','wordcount.txt')">Download</button>
</div>

<!-- Prompt Generator -->
<div class="tool-card">
<h2>Prompt Generator</h2>
<select id="langPrompt">
  <option value="da">Dansk</option>
  <option value="en">English</option>
  <option value="ar">Arabic</option>
  <option value="fr">Français</option>
  <option value="de">Deutsch</option>
  <option value="es">Español</option>
</select>
<button onclick="generatePrompt()">Generate Prompt</button>
<div class="output" id="promptOutput"></div>
<button class="download-btn" onclick="downloadOutput('promptOutput','prompt.txt')">Download</button>
</div>

<!-- Bio Generator -->
<div class="tool-card">
<h2>Bio Generator</h2>
<textarea id="bioText" placeholder="Skriv info om dig…"></textarea>
<button onclick="generateBio()">Generate Bio</button>
<div class="output" id="bioOutput"></div>
<button class="download-btn" onclick="downloadOutput('bioOutput','bio.txt')">Download</button>
</div>

</div>

<footer>Free AI tools for content creators</footer>

<script>
/* --- Hashtag Generator --- */
const hashtagDb = {
  da: { fitness:["#Fitness","#Gym","#Træning","#Sundhed","#Form"], travel:["#Rejse","#Eventyr","#Udforsk","#Ferie","#Wanderlust"] },
  en: { fitness:["#Fitness","#Gym","#Workout","#Health","#FitLife"], travel:["#Travel","#Adventure","#Explore","#Vacation"] },
  ar: { fitness:["#لياقة","#رياضة","#صحة","#تمرين","#نشاط"], travel:["#سفر","#مغامرة","#استكشاف","#رحلة","#عطلة"] },
  fr: { fitness:["#Fitness","#Gym","#Entraînement","#Santé","#Forme"], travel:["#Voyage","#Aventure","#Explorer","#Vacances","#Tourisme"] },
  de: { fitness:["#Fitness","#Gym","#Training","#Gesundheit","#Fit"], travel:["#Reise","#Abenteuer","#Entdecken","#Urlaub","#Erlebnis"] },
  es: { fitness:["#Fitness","#Gimnasio","#Entrenamiento","#Salud","#Forma"], travel:["#Viaje","#Aventura","#Explorar","#Vacaciones","#Turismo"] }
};
function generateHashtags(){
  const topic=document.getElementById("topic").value.toLowerCase();
  const lang=document.getElementById("langHashtag").value;
  const list=(hashtagDb[lang][topic]||["#Content","#Creator","#Trending","#Viral","#Ideas"]);
  document.getElementById("hashtagOutput").innerText=list.join(" ");
}

/* --- Clickbait Title Generator --- */
const titlesDb = {
  da:["Du vil ikke tro hvad der skete med {topic}","5 hemmeligheder om {topic}","Hvordan {topic} ændrede alt","Sandheden om {topic}","Top tricks til {topic}"],
  en:["You won't believe what happened with {topic}","5 secrets about {topic}","How {topic} changed everything","The truth about {topic}","Top tricks for {topic}"],
  ar:["لن تصدق ما حدث مع {topic}","5 أسرار حول {topic}","كيف غيّر {topic} كل شيء","الحقيقة عن {topic}","أفضل حيل لـ {topic}"],
  fr:["Vous ne croirez pas ce qui s'est passé avec {topic}","5 secrets sur {topic}","Comment {topic} a tout changé","La vérité sur {topic}","Astuces pour {topic}"],
  de:["Du wirst nicht glauben, was mit {topic} passiert ist","5 Geheimnisse über {topic}","Wie {topic} alles verändert hat","Die Wahrheit über {topic}","Top Tricks für {topic}"],
  es:["No creerás lo que pasó con {topic}","5 secretos sobre {topic}","Cómo {topic} cambió todo","La verdad sobre {topic}","Trucos para {topic}"]
};
function generateTitle(){
  const topic=document.getElementById("clickbaitTopic").value||"dette emne";
  const lang=document.getElementById("langTitle").value;
  const templates=titlesDb[lang];
  document.getElementById("titleOutput").innerText=templates[Math.floor(Math.random()*templates.length)].replace("{topic}",topic);
}

/* --- Emoji Enhancer --- */
const emojiMap={ love:"❤️", coffee:"☕", travel:"🌍", happy:"😊", food:"🍔", star:"⭐" };
function addEmojis(){
  let txt=document.getElementById("emojiText").value;
  for(const word in emojiMap){
    const re=new RegExp("\\b"+word+"\\b","gi");
    txt=txt.replace(re,emojiMap[word]+" "+word);
  }
  document.getElementById("emojiOutput").innerText=txt;
}

/* --- Word Counter --- */
function countWords(){
  const txt=document.getElementById("wordText").value.trim();
  const words=txt?txt.split(/\s+/).length:0;
  const chars=txt.length;
  document.getElementById("wordOutput").innerText="Words: "+words+"\nCharacters: "+chars;
}

/* --- Prompt Generator --- */
const prompts = {
  da:["Lav ideer om AI til Instagram","Tips til fitness for TikTok","Strategier for rejseindhold","Guides til madblogs"],
  en:["Create AI ideas for Instagram","Fitness tips for TikTok","Travel content strategies","Food blog guides"],
  ar:["إنشاء أفكار AI على Instagram","نصائح للياقة على TikTok","استراتيجيات محتوى السفر","دليل مدونات الطعام"],
  fr:["Créer des idées AI pour Instagram","Conseils fitness pour TikTok","Stratégies de contenu voyage","Guides blog alimentaire"],
  de:["Erstelle AI-Ideen für Instagram","Fitness-Tipps für TikTok","Reisestrategien","Food-Blog-Anleitungen"],
  es:["Crea ideas de AI para Instagram","Consejos de fitness para TikTok","Estrategias de contenido de viaje","Guías de blogs de comida"]
};
function generatePrompt(){
  const lang=document.getElementById("langPrompt").value;
  const list=prompts[lang];
  document.getElementById("promptOutput").innerText=list[Math.floor(Math.random()*list.length)];
}

/* --- Bio Generator --- */
function generateBio(){
  const txt=document.getElementById("bioText").value.trim();
  document.getElementById("bioOutput").innerText=txt?("Bio: "+txt):"Skriv info først.";
}

/* --- Download Function --- */
function downloadOutput(id, filename){
  const text=document.getElementById(id).innerText;
  if(!text){ alert("Intet at downloade!"); return; }
  const blob=new Blob([text],{type:"text/plain"});
  const link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=filename;
  link.click();
}
</script>

</body>
</html>
