<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Tools for Creators</title>
    <style>
        /* Stil som før, men med opdatering til sprog og baggrundsbilleder */
        body {
            font-family: Arial, sans-serif;
            background: #121212;
            color: #f0f0f0;
            padding: 40px 20px;
            margin: 0;
        }
        header {
            text-align: center;
            margin-bottom: 40px;
        }
        h1 {
            color: #bb86fc;
            margin-bottom: 5px;
        }
        .subtitle {
            color: #aaa;
            font-size: 14px;
        }
        .container {
            max-width: 1000px;
            margin: auto;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }
        .tool-card {
            background: #1f1f1f;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.6);
            transition: 0.2s;
        }
        .tool-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.8);
        }
        h2 {
            margin-top: 0;
            color: #bb86fc;
            font-size: 18px;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            margin-top: 8px;
            border: 1px solid #444;
            border-radius: 6px;
            font-size: 14px;
            background: #333;
            color: #f0f0f0;
            box-sizing: border-box;
        }
        textarea {
            min-height: 90px;
        }
        button {
            width: 100%;
            padding: 10px;
            margin-top: 10px;
            background: #bb86fc;
            color: #121212;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            cursor: pointer;
        }
        button:hover {
            background: #985eff;
        }
        .output {
            margin-top: 12px;
            background: #2c2c2c;
            border: 1px solid #444;
            padding: 12px;
            border-radius: 6px;
            white-space: pre-wrap;
            font-size: 14px;
            color: #f0f0f0;
        }
        footer {
            text-align: center;
            margin-top: 40px;
            font-size: 13px;
            color: #aaa;
        }
        @media(max-width:700px) {
            .container {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<header>
    <h1>AI Tools for Creators</h1>
    <div class="subtitle">Gratis værktøjer til captions, hashtags, prompts og rap</div>
</header>

<!-- Language selector -->
<div>
    <select id="languageSelector" onchange="changeLanguage()">
        <option value="en">English</option>
        <option value="da">Dansk</option>
        <option value="es">Español</option>
        <option value="fr">Français</option>
        <option value="de">Deutsch</option>
        <option value="ar">العربية</option>
        <option value="zh">中文</option>
    </select>
</div>

<div class="container">
    <!-- Hashtag Generator -->
    <div class="tool-card">
        <h2 id="hashtagTitle">Hashtag Generator</h2>
        <input id="topic" placeholder="Write topic, e.g., 'fitness'">
        <button onclick="generateHashtags()">Generate Hashtags</button>
        <div class="output" id="hashtagOutput"></div>
    </div>

    <!-- Clickbait Title Generator -->
    <div class="tool-card">
        <h2 id="titleGenerator">Clickbait Title Generator</h2>
        <input id="clickbaitTopic" placeholder="Write topic, e.g., 'AI'">
        <button onclick="generateTitle()">Generate Title</button>
        <div class="output" id="titleOutput"></div>
    </div>

    <!-- Emoji Enhancer -->
    <div class="tool-card">
        <h2 id="emojiEnhancer">Emoji Enhancer</h2>
        <textarea id="emojiText" placeholder="Write text here..."></textarea>
        <button onclick="addEmojis()">Add Emojis</button>
        <div class="output" id="emojiOutput"></div>
    </div>

    <!-- Word Counter -->
    <div class="tool-card">
        <h2 id="wordCounter">Word Counter</h2>
        <textarea id="wordText" placeholder="Write text here..."></textarea>
        <button onclick="countWords()">Count Words</button>
        <div class="output" id="wordOutput"></div>
    </div>

    <!-- Prompt Generator -->
    <div class="tool-card">
        <h2 id="promptGenerator">Prompt Generator</h2>
        <button onclick="generatePrompt()">Generate Prompt</button>
        <div class="output" id="promptOutput"></div>
    </div>

    <!-- Image Converter -->
    <div class="tool-card">
        <h2 id="imageConverter">Image Converter (JPG to PNG)</h2>
        <input type="file" id="imageInput" accept="image/*">
        <button onclick="convertImage()">Convert</button>
        <div class="output" id="imageOutput"></div>
    </div>
</div>

<footer>Free AI tools for content creators</footer>

<script>
// Language specific messages and tool functions
const messages = {
    en: {
        hashtagTitle: "Hashtag Generator",
        titleGenerator: "Clickbait Title Generator",
        emojiEnhancer: "Emoji Enhancer",
        wordCounter: "Word Counter",
        promptGenerator: "Prompt Generator",
        imageConverter: "Image Converter (JPG to PNG)"
    },
    da: {
        hashtagTitle: "Hashtag Generator",
        titleGenerator: "Clickbait Title Generator",
        emojiEnhancer: "Emoji Enhancer",
        wordCounter: "Ord Zæller",
        promptGenerator: "Prompt Generator",
        imageConverter: "Billedkonvertering (JPG til PNG)"
    },
    // Add other languages here...
};

let selectedLanguage = 'en';

function changeLanguage() {
    selectedLanguage = document.getElementById("languageSelector").value;
    document.getElementById("hashtagTitle").textContent = messages[selectedLanguage].hashtagTitle;
    document.getElementById("titleGenerator").textContent = messages[selectedLanguage].titleGenerator;
    document.getElementById("emojiEnhancer").textContent = messages[selectedLanguage].emojiEnhancer;
    document.getElementById("wordCounter").textContent = messages[selectedLanguage].wordCounter;
    document.getElementById("promptGenerator").textContent = messages[selectedLanguage].promptGenerator;
    document.getElementById("imageConverter").textContent = messages[selectedLanguage].imageConverter;
}

// Example tool functions (adjust logic accordingly for your needs)
function generateHashtags() {
    const topic = document.getElementById("topic").value.toLowerCase();
    document.getElementById("hashtagOutput").innerText = `#${topic} #Creator #Trending`;
}

function generateTitle() {
    const topic = document.getElementById("clickbaitTopic").value || "this topic";
    document.getElementById("titleOutput").innerText = `5 secrets about ${topic} no one tells you`;
}

function addEmojis() {
    let txt = document.getElementById("emojiText").value;
    document.getElementById("emojiOutput").innerText = txt + " ❤️😊☕";
}

function countWords() {
    const txt = document.getElementById("wordText").value.trim();
    const words = txt ? txt.split(/\s+/).length : 0;
    const chars = txt.length;
    document.getElementById("wordOutput").innerText = `Words: ${words}\nCharacters: ${chars}`;
}

function generatePrompt() {
    document.getElementById("promptOutput").innerText = "Create marketing ideas for TikTok";
}
