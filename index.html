<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>AI Tools for Creators</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: #121212 url('https://images.unsplash.com/photo-1601597111952-85dcfe5a21f8?auto=format&fit=crop&w=1950&q=80') no-repeat center center fixed;
  background-size: cover;
  margin: 0;
  padding: 40px 20px;
  color: #f0f0f0;
}
header {
  text-align: center;
  margin-bottom: 40px;
}
h1 { color: #bb86fc; margin-bottom: 5px; }
.subtitle { color: #aaa; font-size: 14px; }
.container {
  max-width: 1000px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.tool-card {
  background: rgba(31,31,31,0.9);
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.6);
  transition: 0.2s;
}
.tool-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.8);
}
h2 { margin-top:0; color:#bb86fc; font-size:18px; }
input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border:1px solid #444;
  border-radius:6px;
  font-size:14px;
  background:#333;
  color:#f0f0f0;
  box-sizing:border-box;
}
textarea{ min-height:90px; }
button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#bb86fc;
  color:#121212;
  border:none;
  border-radius:6px;
  font-size:14px;
  cursor:pointer;
}
button:hover{ background:#985eff; }
.output {
  margin-top:12px;
  background:#2c2c2c;
  border:1px solid #444;
  padding:12px;
  border-radius:6px;
  white-space:pre-wrap;
  font-size:14px;
  color:#f0f0f0;
}
footer {
  text-align:center;
  margin-top:40px;
  font-size:13px;
  color:#aaa;
}
.language-select {
  text-align:center;
  margin-bottom:20px;
}
.language-select select {
  padding:6px 10px;
  border-radius:6px;
  border:none;
  background:#333;
  color:#f0f0f0;
  font-size:14px;
  cursor:pointer;
}
@media(max-width:700px){ .container{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
<h1>AI Tools for Creators</h1>
<div class="subtitle" id="subtitle">Gratis værktøjer til captions, hashtags, prompts</div>
</header>

<div class="language-select">
  <label for="lang">Sprog:</label>
  <select id="lang" onchange="setLanguage(this.value)">
    <option value="da">Dansk</option>
    <option value="en">English</option>
    <option value="fr">Français</option>
    <option value="es">Español</option>
    <option value="de">Deutsch</option>
    <option value="ar">العربية</option>
    <option value="zh">中文</option>
  </select>
</div>

<div class="container">

<!-- Hashtag Generator -->
<div class="tool-card">
<h2 id="hashtagLabel">Hashtag Generator</h2>
<input id="topic" placeholder="Skriv emne fx 'fitness'">
<button onclick="generateHashtags()" id="hashtagBtn">Generate Hashtags</button>
<div class="output" id="hashtagOutput"></div>
</div>

<!-- Clickbait Title Generator -->
<div class="tool-card">
<h2 id="clickbaitLabel">Clickbait Title Generator</h2>
<input id="clickbaitTopic" placeholder="Skriv emne fx 'AI'">
<button onclick="generateTitle()" id="clickbaitBtn">Generate Title</button>
<div class="output" id="titleOutput"></div>
</div>

<!-- Emoji Enhancer -->
<div class="tool-card">
<h2 id="emojiLabel">Emoji Enhancer</h2>
<textarea id="emojiText" placeholder="Skriv tekst…"></textarea>
<button onclick="addEmojis()" id="emojiBtn">Add Emojis</button>
<div class="output" id="emojiOutput"></div>
</div>

<!-- Word Counter -->
<div class="tool-card">
<h2 id="wordLabel">Word Counter</h2>
<textarea id="wordText" placeholder="Skriv tekst…"></textarea>
<button onclick="countWords()" id="wordBtn">Count Words</button>
<div class="output" id="wordOutput"></div>
</div>

<!-- Prompt Generator -->
<div class="tool-card">
<h2 id="promptLabel">Prompt Generator</h2>
<button onclick="generatePrompt()" id="promptBtn">Generate Prompt</button>
<div class="output" id="promptOutput"></div>
</div>

<!-- Image Converter -->
<div class="tool-card">
<h2 id="imageLabel">Image Converter (PNG/JPG to WebP)</h2>
<input type="file" id="imageInput" accept="image/*">
<button onclick="convertImage()" id="imageBtn">Convert Image</button>
<div class="output" id="imageOutput"></div>
</div>

<!-- Audio Converter -->
<div class="tool-card">
<h2 id="audioLabel">Audio Converter (MP3 to WAV, FLAC)</h2>
<input type="file" id="audioInput" accept="audio/mp3, audio/wav, audio/flac">
<button onclick="convertAudio()" id="audioBtn">Convert Audio</button>
<div class="output" id="audioOutput"></div>
</div>

</div>

<footer id="footerText">Free AI tools for content creators</footer>
