<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Tools for Creators</title>
  <style>
    body {
      font-family: 'Arial', sans-serif;
      padding: 20px;
      background: #f0f4f8;
      color: #333;
    }

    h1 {
      color: #0d47a1;
      text-align: center;
      margin-bottom: 40px;
    }

    .tool-card {
      padding: 20px;
      margin: 20px auto;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      max-width: 500px;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .tool-card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.15);
    }

    h2 {
      margin-top: 0;
    }

    input, textarea {
      font-size: 16px;
      margin: 5px 0;
      padding: 8px;
      width: 100%;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 5px;
    }

    button {
      background: #0d47a1;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 10px;
      margin-top: 10px;
      width: 100%;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #1565c0;
      transform: scale(1.03);
    }

    .output {
      background: #f9f9f9;
      padding: 15px;
      border: 1px solid #ccc;
      margin-top: 10px;
      white-space: pre-wrap;
      border-radius: 5px;
    }

    /* Farver per kort */
    #hashtagCard { background: #e1bee7; }      /* lilla */
    #clickbaitCard { background: #ffe0b2; }    /* orange */
    #emojiCard { background: #fff9c4; }        /* gul */
    #wordCard { background: #c8e6c9; }         /* grøn */
    #promptCard { background: #b3e5fc; }       /* blå */
  </style>
</head>
<body>

<h1>AI Tools for Creators</h1>

<!-- 1. Hashtag Generator -->
<div class="tool-card" id="hashtagCard">
  <h2>#️⃣ Hashtag Generator</h2>
  <input id="topic" placeholder="Skriv emne fx 'fitness'">
  <button onclick="generateHashtags()">Generate Hashtags</button>
  <div class="output" id="hashtagOutput"></div>
</div>

<!-- 2. Clickbait Title Generator -->
<div class="tool-card" id="clickbaitCard">
  <h2>📝 Clickbait Title Generator</h2>
  <input id="clickbaitTopic" placeholder="Skriv emne fx 'AI'">
  <button onclick="generateTitle()">Generate Title</button>
  <div class="output" id="titleOutput"></div>
</div>

<!-- 3. Emoji Enhancer -->
<div class="tool-card" id="emojiCard">
  <h2>😄 Emoji Enhancer</h2>
  <textarea id="emojiText" placeholder="Skriv sætning…"></textarea>
  <button onclick="addEmojis()">Add Emojis</button>
  <div class="output" id="emojiOutput"></div>
</div>

<!-- 4. Word Counter -->
<div class="tool-card" id="wordCard">
  <h2>📊 Word Counter & Readability</h2>
  <textarea id="wordText" placeholder="Skriv din tekst…"></textarea>
  <button onclick="countWords()">Count Words</button>
  <div class="output" id="wordOutput"></div>
</div>

<!-- 5. Prompt Mix Generator -->
<div class="tool-card" id="promptCard">
  <h2>💡 Prompt Mix Generator</h2>
  <button onclick="generatePrompt()">Generate Random Prompt</button>
  <div class="output" id="promptOutput"></div>
</div>

<script>
/* --- Hashtag Generator --- */
const hashtagDb = {
  fitness:["#FitnessLife","#Workout","#HealthGoals","#GymTime","#NoPainNoGain"],
  travel:["#TravelLife","#Wanderlust","#Adventure","#Explore","#VacationMode"],
  food:["#Foodie","#Yummy","#Delicious","#FoodLover","#InstaFood"],
  fashion:["#OOTD","#Style","#Fashionista","#Trendy","#LookBook"],
  tech:["#Tech","#Innovation","#Gadgets","#AI","#Future"]
};
function generateHashtags() {
  const topic=document.getElementById("topic").value.toLowerCase();
  const list=hashtagDb[topic] || ["#Inspiration","#Fun","#Life","#Motivation","#Creative"];
  document.getElementById("hashtagOutput").innerText=list.join(" ");
}

/* --- Clickbait Title Generator --- */
const templates=[
  "Du vil ikke tro hvad der skete da {topic}…",
  "5 ting alle bør vide om {topic}",
  "Sådan mestrer du {topic} på 7 dage",
  "Hemmelige tricks til {topic} som eksperter ikke vil fortælle dig",
  "Alt du skal vide om {topic} inden du starter"
];
function generateTitle() {
  const topic=document.getElementById("clickbaitTopic").value || "emnet";
  const template=templates[Math.floor(Math.random()*templates.length)];
  document.getElementById("titleOutput").innerText=template.replace("{topic}",topic);
}

/* --- Emoji Enhancer --- */
const emojiMap={love:"❤️",happy:"😊",coffee:"☕",travel:"🌍",fun:"🎉",food:"🍔",star:"⭐"};
function addEmojis() {
  let txt=document.getElementById("emojiText").value;
  for(const word in emojiMap){
    const re=new RegExp("\\b"+word+"\\b","gi");
    txt=txt.replace(re,emojiMap[word]+" $&");
  }
  document.getElementById("emojiOutput").innerText=txt;
}

/* --- Word Counter --- */
function countWords() {
  const txt=document.getElementById("wordText").value.trim();
  const words=txt?txt.split(/\s+/).length:0;
  const chars=txt.length;
  document.getElementById("wordOutput").innerText=`Words: ${words}\nCharacters: ${chars}`;
}

/* --- Prompt Mix Generator --- */
const subjects=["AI","Marketing","Travel","Food","Fashion","Fitness"];
const actions=["tips","ideas","guides","tricks","facts"];
const formats=["for Instagram","for TikTok","for Blogs","for YouTube","for Twitter"];
function generatePrompt() {
  const subject=subjects[Math.floor(Math.random()*subjects.length)];
  const action=actions[Math.floor(Math.random()*actions.length)];
  const format=formats[Math.floor(Math.random()*formats.length)];
  document.getElementById("promptOutput").innerText=`Create ${action} about ${subject} ${format}`;
}
</script>

</body>
</html>
