<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>AI Tools for Creators</title>
<style>
body {
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #121212, #1e1e1e);
  color: #f0f0f0;
  margin: 0;
  padding: 40px 20px;
}
header {
  text-align: center;
  margin-bottom: 40px;
}
h1 { color: #bb86fc; margin-bottom: 0; }
.subtitle { color: #aaa; font-size: 14px; margin-top: 4px; }
.container {
  max-width: 1000px;
  margin:auto;
  display:grid;
  grid-template-columns: 1fr 1fr;
  gap:20px;
}
.tool-card {
  background:#1f1f1f;
  padding:20px;
  border-radius:10px;
  box-shadow:0 4px 14px rgba(0,0,0,0.6);
}
.tool-card h2 {
  margin-top:0;
  color:#bb86fc;
}
input, textarea {
  width:100%;
  padding:10px;
  margin-top:8px;
  border-radius:6px;
  border:1px solid #444;
  background:#333;
  color:#f0f0f0;
  box-sizing:border-box;
}
textarea { min-height:90px; }
button {
  width:100%;
  padding:10px;
  margin-top:10px;
  background:#bb86fc;
  color:#121212;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
button:hover { background:#985eff; }
.output {
  margin-top:12px;
  background:#2c2c2c;
  border:1px solid #444;
  padding:12px;
  border-radius:6px;
  white-space:pre-wrap;
  font-size:14px;
  color:#f0f0f0;
}
footer {
  text-align:center;
  margin-top:40px;
  font-size:13px;
  color:#aaa;
}
@media(max-width:700px){ .container{grid-template-columns:1fr;} }
</style>
</head>
<body>

<header>
<h1>AI Tools for Creators</h1>
<div class="subtitle">Gratis værktøjer til tekst, hashtags, prompts og rap</div>
</header>

<div class="container">

<div class="tool-card">
<h2>Hashtag Generator</h2>
<input id="topic" placeholder="Skriv emne fx fitness travel">
<button onclick="generateHashtags()">Generate Hashtags</button>
<div class="output" id="hashtagOutput"></div>
</div>

<div class="tool-card">
<h2>Clickbait Title Generator</h2>
<input id="clickbaitTopic" placeholder="Skriv emne fx AI tools">
<button onclick="generateTitle()">Generate Title</button>
<div class="output" id="titleOutput"></div>
</div>

<div class="tool-card">
<h2>Emoji Enhancer</h2>
<textarea id="emojiText" placeholder="Skriv tekst…"></textarea>
<button onclick="addEmojis()">Add Emojis</button>
<div class="output" id="emojiOutput"></div>
</div>

<div class="tool-card">
<h2>Word Counter</h2>
<textarea id="wordText" placeholder="Skriv tekst…"></textarea>
<button onclick="countWords()">Count Words</button>
<div class="output" id="wordOutput"></div>
</div>

<div class="tool-card">
<h2>Prompt Generator</h2>
<button onclick="generatePrompt()">Generate Prompt</button>
<div class="output" id="promptOutput"></div>
</div>

<div class="tool-card">
<h2>AI Rap Generator</h2>
<textarea id="rapInput" placeholder="Skriv idé, tekst eller historie…"></textarea>
<button onclick="generateRap()">Generate Rap</button>
<button onclick="downloadRap()">Download Rap</button>
<div class="output" id="rapOutput"></div>
</div>

</div>

<footer>© 2026 WellnessTop4 - All rights reserved</footer>

<script>
// Hashtag Generator - virker for alle ord
function generateHashtags(){
  const inp=document.getElementById("topic").value.trim().toLowerCase();
  if(!inp){ document.getElementById("hashtagOutput").innerText="Skriv emne først."; return; }
  const words=inp.split(/\s+/);
  const hashtags=words.map(w=>"#"+w.replace(/[^a-z0-9]/gi,""));
  document.getElementById("hashtagOutput").innerText=hashtags.join(" ");
}

// Clickbait Title Generator
const cbTemplates=[
  "Du vil ikke tro hvad der skete med {topic}",
  "5 ting du SKAL vide om {topic}",
  "Sandheden om {topic} alle overser",
  "Sådan mestrer du {topic} hurtigt",
  "{topic}: De bedste tips nogensinde"
];
function generateTitle(){
  const t=document.getElementById("clickbaitTopic").value.trim()||"dette emne";
  const tpl=cbTemplates[Math.floor(Math.random()*cbTemplates.length)];
  document.getElementById("titleOutput").innerText=tpl.replace("{topic}",t);
}

// Emoji Enhancer
const emojiMap={ love:"❤️", coffee:"☕", travel:"🌍", happy:"😊", food:"🍔", star:"⭐" };
function addEmojis(){
  let txt=document.getElementById("emojiText").value;
  for(const w in emojiMap){
    txt=txt.replace(new RegExp("\\b"+w+"\\b","gi"),emojiMap[w]+" "+w);
  }
  document.getElementByText=""; // fallback safe
  document.getElementById("emojiOutput").innerText=txt;
}

// Word Counter
function countWords(){
  const txt=document.getElementById("wordText").value.trim();
  const words=txt?txt.split(/\s+/).length:0;
  const chars=txt.length;
  document.getElementById("wordOutput").innerText=`Words: ${words}\nCharacters: ${chars}`;
}

// Prompt Generator
const subs=["AI","Fitness","Marketing","Travel","Food","Tech","Content"];
const acts=["ideas","tips","strategies","guides","secrets"];
const forms=["for TikTok","for Instagram","for YouTube","for blogs"];
function generatePrompt(){
  const s=subs[Math.floor(Math.random()*subs.length)];
  const a=acts[Math.floor(Math.random()*acts.length)];
  const f=forms[Math.floor(Math.random()*forms.length)];
  document.getElementById("promptOutput").innerText=`Create ${a} about ${s} ${f}`;
}

// Rap Generator (rim + flow)
function generateRap(){
  const inp=document.getElementById("rapInput").value.trim();
  if(!inp){ document.getElementById("rapOutput").innerText="Skriv noget tekst først."; return; }
  const lines=inp.split(/\n|\.|,/).filter(l=>l.trim());
  let rapText="";
  const rhymeEnd=["flow","show","go","yo","know","blow","pro","low"];
  lines.forEach((l,i)=>{
    const lastWord=l.trim().split(" ").pop();
    const rhyme=rhymeEnd[Math.floor(Math.random()*rhymeEnd.length)];
    rapText+=`🎤 ${l.trim()} ${rhyme}\n`;
    if(i%2==1) rapText+="🔥 Keep it moving\n";
  });
  document.getElementById("rapOutput").innerText=rapText;
}

// Download Rap
function downloadRap(){
  const rap=document.getElementById("rapOutput").innerText;
  if(!rap){ alert("Generer rap først!"); return; }
  const blob=new Blob([rap], {type:"text/plain"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;
  a.download="rap_song.txt";
  a.click();
}
</script>

</body>
</html>
