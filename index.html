<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<title>AI Tools for Creators</title>
<style>
/* --- Global Styles --- */
body {
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: #121212;
  color: #f0f0f0;
  margin: 0;
  padding: 0;
}
header {
  text-align: center;
  padding: 60px 20px 40px;
  background: linear-gradient(135deg, #1f1f1f, #1a1a1a);
}
header h1 {
  color: #bb86fc;
  font-size: 36px;
  margin-bottom: 5px;
}
header .subtitle {
  color: #aaa;
  font-size: 16px;
}

/* --- Container --- */
.container {
  max-width: 1100px;
  margin: 40px auto;
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 25px;
  padding: 0 20px;
}

/* --- Tool Cards --- */
.tool-card {
  background: #1f1f1f;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 6px 20px rgba(0,0,0,0.7);
  transition: transform 0.3s, box-shadow 0.3s;
}
.tool-card:hover {
  transform: translateY(-6px);
  box-shadow: 0 12px 30px rgba(0,0,0,0.85);
}
.tool-card h2 {
  color: #bb86fc;
  margin-top: 0;
  font-size: 20px;
  margin-bottom: 12px;
}

/* --- Inputs & Buttons --- */
input, textarea {
  width: 100%;
  padding: 12px;
  margin-top: 8px;
  border: 1px solid #444;
  border-radius: 8px;
  font-size: 15px;
  background: #222;
  color: #f0f0f0;
  box-sizing: border-box;
}
textarea { min-height: 100px; }
button {
  width: 100%;
  padding: 12px;
  margin-top: 12px;
  background: #bb86fc;
  color: #121212;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  cursor: pointer;
  transition: background 0.3s;
}
button:hover { background: #985eff; }

/* --- Output --- */
.output {
  margin-top: 14px;
  background: #2c2c2c;
  border: 1px solid #444;
  padding: 14px;
  border-radius: 8px;
  white-space: pre-wrap;
  font-size: 14px;
  color: #f0f0f0;
}

/* --- Footer --- */
footer {
  text-align: center;
  padding: 30px 20px;
  font-size: 14px;
  color: #aaa;
  margin-top: 50px;
  border-top: 1px solid #333;
}

/* --- Responsive --- */
@media(max-width:700px){ .container{ grid-template-columns:1fr; } }
</style>
</head>
<body>

<header>
  <h1>AI Tools for Creators</h1>
  <div class="subtitle">Gratis værktøjer til captions, hashtags, prompts og rap</div>
</header>

<div class="container">

  <!-- Hashtag Generator -->
  <div class="tool-card">
    <h2>Hashtag Generator</h2>
    <input id="topic" placeholder="Skriv emne fx 'fitness'">
    <button onclick="generateHashtags()">Generate Hashtags</button>
    <div class="output" id="hashtagOutput"></div>
  </div>

  <!-- Clickbait Title Generator -->
  <div class="tool-card">
    <h2>Clickbait Title Generator</h2>
    <input id="clickbaitTopic" placeholder="Skriv emne fx 'AI'">
    <button onclick="generateTitle()">Generate Title</button>
    <div class="output" id="titleOutput"></div>
  </div>

  <!-- Emoji Enhancer -->
  <div class="tool-card">
    <h2>Emoji Enhancer</h2>
    <textarea id="emojiText" placeholder="Skriv tekst…"></textarea>
    <button onclick="addEmojis()">Add Emojis</button>
    <div class="output" id="emojiOutput"></div>
  </div>

  <!-- Word Counter -->
  <div class="tool-card">
    <h2>Word Counter</h2>
    <textarea id="wordText" placeholder="Skriv tekst…"></textarea>
    <button onclick="countWords()">Count Words</button>
    <div class="output" id="wordOutput"></div>
  </div>

  <!-- Prompt Generator -->
  <div class="tool-card">
    <h2>Prompt Generator</h2>
    <button onclick="generatePrompt()">Generate Prompt</button>
    <div class="output" id="promptOutput"></div>
  </div>

  <!-- Rap Generator -->
  <div class="tool-card">
    <h2>AI Rap Song Generator</h2>
    <textarea id="rapInput" placeholder="Skriv idé, tekst eller historie…"></textarea>
    <button onclick="generateRapSong()">Generate Rap</button>
    <div class="output" id="rapSongOutput"></div>
  </div>

</div>

<footer>Free AI tools for content creators</footer>

<script>
/* HASHTAGS */
const hashtagDb={
  fitness:["#Fitness","#Gym","#Workout","#Health","#FitLife"],
  travel:["#Travel","#Adventure","#Explore","#Wanderlust","#TravelLife"],
  food:["#Food","#Foodie","#Delicious","#InstaFood","#Yummy"],
  tech:["#Tech","#AI","#Innovation","#Future","#Startup"]
};
function generateHashtags(){
  const topic=document.getElementById("topic").value.toLowerCase();
  const list=hashtagDb[topic]||["#Content","#Creator","#Trending","#Viral","#Ideas"];
  document.getElementById("hashtagOutput").innerText=list.join(" ");
}

/* CLICKBAIT */
const titles=[
  "Du vil ikke tro hvad der skete med {topic}",
  "5 hemmeligheder om {topic} som ingen fortæller",
  "Hvordan {topic} ændrede alt",
  "Sandheden om {topic}",
  "Top tricks creators bruger til {topic}"
];
function generateTitle(){
  const topic=document.getElementById("clickbaitTopic").value||"dette emne";
  const template=titles[Math.floor(Math.random()*titles.length)];
  document.getElementById("titleOutput").innerText=template.replace("{topic}",topic);
}

/* EMOJIS */
const emojiMap={ love:"❤️", coffee:"☕", travel:"🌍", happy:"😊", food:"🍔", star:"⭐" };
function addEmojis(){
  let txt=document.getElementById("emojiText").value;
  for(const word in emojiMap){
    const re=new RegExp("\\b"+word+"\\b","gi");
    txt=txt.replace(re,emojiMap[word]+" "+word);
  }
  document.getElementById("emojiOutput").innerText=txt;
}

/* WORD COUNTER */
function countWords(){
  const txt=document.getElementById("wordText").value.trim();
  const words=txt?txt.split(/\s+/).length:0;
  const chars=txt.length;
  document.getElementById("wordOutput").innerText="Words: "+words+"\nCharacters: "+chars;
}

/* PROMPT GENERATOR */
const subjects=["AI","Fitness","Marketing","Travel","Food"];
const actions=["ideas","tips","strategies","guides"];
const formats=["for TikTok","for Instagram","for YouTube","for blogs"];
function generatePrompt(){
  const s=subjects[Math.floor(Math.random()*subjects.length)];
  const a=actions[Math.floor(Math.random()*actions.length)];
  const f=formats[Math.floor(Math.random()*formats.length)];
  document.getElementById("promptOutput").innerText="Create "+a+" about "+s+" "+f;
}

/* RAP GENERATOR */
function generateRapSong(){
  const text=document.getElementById("rapInput").value.trim();
  if(!text){ document.getElementById("rapSongOutput").innerText="Skriv tekst først."; return; }
  const lines=text.split(/\n|\.|,/).filter(l=>l.trim()!="");
  let rap="";
  lines.forEach(l=>{
    rap+="🎵 "+l+"\n";
  });
  document.getElementById("rapSongOutput").innerText=rap;
}
</script>

</body>
</html>
