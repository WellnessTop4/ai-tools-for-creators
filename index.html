<style>
body {
  font-family: Arial, sans-serif;
  background: #121212; /* mørk baggrund */
  margin: 0;
  padding: 40px 20px;
  color: #f0f0f0; /* lys tekst */
}
header {
  text-align: center;
  margin-bottom: 40px;
}
h1 {
  color: #bb86fc; /* lidt farve til header */
  margin-bottom: 5px;
}
.subtitle {
  color: #aaa;
  font-size: 14px;
}
.container {
  max-width: 1000px;
  margin: auto;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px;
}
.tool-card {
  background: #1e1e1e; /* mørk kort baggrund */
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 4px 14px rgba(0,0,0,0.6);
  transition: 0.2s;
}
.tool-card:hover {
  transform: translateY(-4px);
  box-shadow: 0 8px 20px rgba(0,0,0,0.8);
}
h2 {
  margin-top: 0;
  color: #bb86fc;
  font-size: 18px;
}
input, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  border: 1px solid #333;
  border-radius: 6px;
  font-size: 14px;
  background: #2c2c2c;
  color: #f0f0f0;
  box-sizing: border-box;
}
button {
  width: 100%;
  padding: 10px;
  margin-top: 10px;
  background: #bb86fc;
  color: #121212;
  border: none;
  border-radius: 6px;
  font-size: 14px;
  cursor: pointer;
}
button:hover {
  background: #985eff;
}
.output {
  margin-top: 12px;
  background: #2c2c2c;
  border: 1px solid #444;
  padding: 12px;
  border-radius: 6px;
  white-space: pre-wrap;
  font-size: 14px;
  color: #f0f0f0;
}
footer {
  text-align: center;
  margin-top: 40px;
  font-size: 13px;
  color: #aaa;
}
@media(max-width:700px){
  .container{ grid-template-columns:1fr; }
}
</style>
